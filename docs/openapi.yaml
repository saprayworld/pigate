        '200':
          description: Custom routes deleted
          content:
            application/json:
              schema:
                type: boolean
                example: true

  /routes/config:
    get:
      tags:
        - Static Routes
      summary: Get routing configuration flags
      description: |
        Returns the current backend configuration flags that control routing behavior:
        - `allowEditSystemRoutes`: whether system/kernel-detected routes can be edited or deleted
        - `prioritizeKernelRoutes`: whether kernel routing table is used as source of truth for route status
      responses:
        '200':
          description: Routing configuration flags
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoutesConfig'

  /routes/{id}/toggle:
    post:
      tags:
        - Static Routes
      summary: Toggle active status (enable/disable) of a route
      description: |
        Toggles the `status` field of the route in the database.
        - `custom` and `defaultgateway` routes: always toggleable.
        - `system` routes: blocked unless `-allow-edit-system-routes` flag is set on the backend.
        After toggle, the new route status is applied to the kernel via netlink.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Route status toggled, returns updated route
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaticRoute'
