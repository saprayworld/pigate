# =========================================================================
# COMPONENTS & SCHEMAS
# =========================================================================
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: pigate_session
      description: |
        HttpOnly session cookie set by POST /auth/login. Sent automatically by
        the browser on same-site requests; it is the only supported auth channel.

  responses:
    Unauthorized:
      description: Authentication required or token is invalid/expired
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Unauthorized

    BadRequest:
      description: Invalid request body or parameters
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Bad Request

    NotFound:
      description: The requested resource was not found
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Not Found

  schemas:
    # --- Central Event Log Schemas ---
    SystemEvent:
      type: object
      description: A single audit/event log entry, persisted to SQLite across reboots.
      properties:
        id:
          type: integer
          format: int64
          example: 42
        time:
          type: string
          format: date-time
          description: Event timestamp in RFC3339 UTC (frontend converts to local time)
          example: "2026-07-09T04:12:33Z"
        category:
          type: string
          enum: [auth, user, network, firewall, route, dhcp, dns, qos, system, config]
          example: auth
        action:
          type: string
          description: Machine-readable action identifier
          example: login.failed
        severity:
          type: string
          enum: [info, warning, error, critical]
          example: warning
        actor:
          type: string
          description: Username that performed the action, or "system"
          example: pigate
        target:
          type: string
          description: Object affected by the action (user/interface/policy name, MAC, ...)
          example: wlan0
        message:
          type: string
          description: Human-readable message for the UI
          example: Login failed for pigate (wrong password)

    # --- User Management Schemas ---
    User:
      type: object
      description: A dashboard administrator account. The password hash is never serialized.
      properties:
        id:
          type: string
          example: user-3f9a2c1b7e6d5a4c
        username:
          type: string
          example: pigate
        isInitial:
          type: boolean
          description: If true, the user must change their password before using other endpoints.
          example: false
        role:
          type: string
          enum: [super_admin, admin_readonly]
          example: super_admin
        status:
          type: string
          enum: [active, disabled]
          example: active
        createdAt:
          type: string
          format: date-time

    CreateUserRequest:
      type: object
      required:
        - username
        - password
        - role
      properties:
        username:
          type: string
          description: 3-32 characters, only a-z A-Z 0-9 and underscore. Immutable after creation.
          example: viewer
        password:
          type: string
          format: password
          description: At least 8 characters.
          example: password123
        role:
          type: string
          enum: [super_admin, admin_readonly]
          example: admin_readonly

    UpdateUserRequest:
      type: object
      required:
        - role
      properties:
        role:
          type: string
          enum: [super_admin, admin_readonly]
          example: super_admin
        password:
          type: string
          format: password
          nullable: true
          description: Optional. When present, resets the user's password and forces a change on next login.
          example: newpassword456

    # --- Dashboard Schemas ---
    DashboardStats:
      type: object
      required:
        - firewallStatus
        - totalTrafficInBytes
        - totalTrafficOutBytes
        - dhcpLeasesCount
        - wifiStatus
        - wifiSSID
      properties:
        firewallStatus:
          type: string
          example: Active
        totalTrafficInBytes:
          type: integer
          format: int64
          description: Cumulative WAN rx bytes since boot (RAM-only; resets on reboot).
          example: 9345678901
        totalTrafficOutBytes:
          type: integer
          format: int64
          description: Cumulative WAN tx bytes since boot (RAM-only; resets on reboot).
          example: 3987654321
        dhcpLeasesCount:
          type: integer
          example: 18
        wifiStatus:
          type: string
          example: wlan0 Master
        wifiSSID:
          type: string
          example: PiGate-Secure

    PerformanceMetrics:
      type: object
      description: >
        Live host telemetry. The flat cpu/memory/temp fields are retained for
        backward-compatibility; the *Detail objects and storage carry the richer
        data used by the redesigned dashboard.
      required:
        - cpu
        - memory
        - temp
        - cpuDetail
        - memDetail
        - tempDetail
        - storage
      properties:
        cpu:
          type: number
          format: float
          description: CPU usage percent (mirror of cpuDetail.usagePercent).
          example: 34.2
        memory:
          type: number
          format: float
          description: Memory usage percent (mirror of memDetail.percent).
          example: 63.7
        temp:
          type: number
          format: float
          description: SoC temperature °C (0 when tempDetail.available is false).
          example: 58.1
        cpuDetail:
          type: object
          required: [usagePercent, cores, modelName, freqMhz, freqAvailable]
          properties:
            usagePercent:
              type: number
              format: float
              example: 34.2
            cores:
              type: integer
              example: 4
            modelName:
              type: string
              example: Cortex-A76
            freqMhz:
              type: number
              format: float
              example: 2400
            freqAvailable:
              type: boolean
              description: false when /sys cpufreq is absent (e.g. WSL/VM).
              example: true
        memDetail:
          type: object
          required: [usedBytes, totalBytes, percent]
          properties:
            usedBytes:
              type: integer
              format: int64
              example: 5476083712
            totalBytes:
              type: integer
              format: int64
              example: 8589934592
            percent:
              type: number
              format: float
              example: 63.7
        tempDetail:
          type: object
          required: [celsius, throttleCelsius, available]
          properties:
            celsius:
              type: number
              format: float
              example: 58.1
            throttleCelsius:
              type: number
              format: float
              example: 80
            available:
              type: boolean
              description: false when no thermal zone exists (e.g. WSL/x86).
              example: true
        storage:
          type: object
          required: [path, usedBytes, totalBytes, percent]
          properties:
            path:
              type: string
              example: /
            usedBytes:
              type: integer
              format: int64
              example: 44023414784
            totalBytes:
              type: integer
              format: int64
              example: 137438953472
            percent:
              type: number
              format: float
              example: 32.0

    SystemInfo:
      type: object
      required:
        - hostname
        - version
        - osName
        - uptimeSeconds
        - systemTime
        - timezone
      properties:
        hostname:
          type: string
          example: PiGate-RPI5
        version:
          type: string
          example: 2.3.2
        osName:
          type: string
          example: Raspberry Pi OS (64-bit)
        boardModel:
          type: string
          description: Omitted when unreadable (non-Pi / x86).
          example: Raspberry Pi 5 Model B Rev 1.0
        kernelVersion:
          type: string
          description: Omitted when unreadable.
          example: 6.6.31-v8+
        uptimeSeconds:
          type: integer
          format: int64
          description: Seconds since boot; the client ticks its own clock between polls.
          example: 273153
        systemTime:
          type: string
          format: date-time
          example: '2026-07-06T09:41:00+07:00'
        timezone:
          type: string
          example: Asia/Bangkok

    TrafficBucket:
      type: object
      required:
        - ts
        - rxBytes
        - txBytes
      properties:
        ts:
          type: string
          format: date-time
          description: Bucket start time (device local, 5-minute aligned).
          example: '2026-07-06T09:00:00+07:00'
        rxBytes:
          type: integer
          format: int64
          example: 123456789
        txBytes:
          type: integer
          format: int64
          example: 2345678

    TrafficHistory:
      type: object
      required:
        - interfaces
        - buckets
      properties:
        interfaces:
          type: array
          items:
            type: string
          example: [eth0]
        buckets:
          type: array
          items:
            $ref: '#/components/schemas/TrafficBucket'

    FirewallLog:
      type: object
      required:
        - id
        - time
        - action
        - src
        - dest
        - port
        - proto
        - inIface
        - outIface
        - reason
      properties:
        id:
          type: string
          example: log-1
        time:
          type: string
          example: "14:31:02"
        action:
          type: string
          enum: [PASS, DROP]
          example: DROP
        src:
          type: string
          example: 185.220.101.4
        dest:
          type: string
          example: 10.0.0.45
        port:
          type: string
          example: "445"
        proto:
          type: string
          example: TCP
        inIface:
          type: string
          description: Ingress interface name (NFLOG indev); "-" if unknown.
          example: eth0
        outIface:
          type: string
          description: Egress interface name (NFLOG outdev); "-" if unknown.
          example: eth1
        reason:
          type: string
          example: Blocked Port (SMB)

    # --- Network Interface Schemas ---
    NetworkInterface:
      type: object
      required:
        - id
        - name
        - alias
        - role
        - type
        - subtype
        - addressingMode
        - ip
        - netmask
        - gateway
        - macAddress
        - adminAccess
        - status
        - speed
      properties:
        id:
          type: string
          example: iface-1
        name:
          type: string
          description: OS-level interface name (e.g. eth0, wlan0)
          example: eth0
        alias:
          type: string
          description: >-
            Human-readable label for the interface, shown UI-wide as "alias (name)".
            Unique across interfaces (case-insensitive) and must not equal another
            interface's OS name; an empty alias defaults to the OS name.
          example: LAN_Internal
        role:
          type: string
          enum: [LAN, WAN]
          example: LAN
        type:
          type: string
          enum: [ethernet, wireless]
          example: ethernet
        subtype:
          type: string
          description: |
            More specific interface subtype. Examples: 'device' (physical NIC), 'veth' (virtual ethernet),
            'bridge' (software bridge), 'vlan' (VLAN sub-interface).
          example: device
        addressingMode:
          type: string
          enum: [dhcp, static]
          example: static
        ip:
          type: string
          example: 192.168.1.1
        netmask:
          type: string
          description: CIDR prefix length as string (e.g. "24")
          example: "24"
        gateway:
          type: string
          example: ""
        metric:
          type: integer
          nullable: true
          minimum: 1
          maximum: 9999
          description: >-
            Default-gateway route priority for this interface (lower = preferred,
            used for multi-WAN failover). null/omitted means auto (static uses 100,
            dhcp keeps dhcpcd's default). IPv4 only.
          example: 100
        macAddress:
          type: string
          example: "DC:A6:32:AA:BB:C1"
        adminAccess:
          type: array
          description: List of management protocols allowed on this interface
          items:
            type: string
            enum: [HTTPS, HTTP, PING, SSH]
          example: [PING, HTTP, SSH]
        status:
          type: string
          enum: [up, down, offline]
          description: >-
            Live administrative state of the interface. "offline" is a computed value (never
            persisted): the interface has a configuration row in the database but no live
            kernel link — e.g. a VLAN whose parent vanished or an unplugged USB NIC. Offline
            rows appear in GET /interfaces so the config can be deleted; mutating endpoints
            reject them with 409.
          example: up
        managed:
          type: boolean
          description: >-
            Computed field (not persisted): true when the interface has a configuration
            row in the database (pigate has configured it). false marks an interface that
            exists in the kernel but is unmanaged — e.g. one never configured, or one whose
            config was removed via Reset. Purely informational; does not change any behavior.
          example: true
        speed:
          type: string
          description: Link speed string from kernel (e.g. "1000 Mbps")
          example: "1000 Mbps"
        vlanParent:
          type: string
          nullable: true
          description: >-
            Parent interface name for an 802.1Q VLAN sub-interface. Present only when
            subtype='vlan'. Immutable after creation.
          example: eth0
        vlanId:
          type: integer
          nullable: true
          minimum: 1
          maximum: 4094
          description: >-
            802.1Q VLAN ID for a VLAN sub-interface. Present only when subtype='vlan'.
            Immutable after creation.
          example: 100
        # Optional Wireless-only Fields (present when type=wireless)
        wifiSSID:
          type: string
          example: MyHome_5G
        wifiPassword:
          type: string
          description: Masked as "••••••••" in API responses for security. Send masked value to preserve existing password.
          example: "••••••••"
        wifiSecurity:
          type: string
          description: Wi-Fi security protocol (Open, WPA2-PSK, WPA3-SAE, etc.)
          example: WPA2-PSK
        macMode:
          type: string
          enum: [hardware, randomized, laa]
          description: |
            MAC address mode for the wireless interface.
            - hardware: use the real burned-in MAC address
            - randomized: let wpa_supplicant randomize MAC per-connection (preassoc_mac_addr=1, mac_addr=1)
            - laa: use a locally administered address (LAA) specified in laaMacAddress
          example: hardware
        realMacAddress:
          type: string
          description: The actual hardware MAC burned into the NIC
          example: "DC:A6:32:AA:BB:C1"
        randomizedMac:
          type: string
          description: Last randomized MAC address used by wpa_supplicant
          example: "4E:88:2F:BC:A1:90"
        laaMacAddress:
          type: string
          description: Custom locally administered MAC address when macMode=laa
          example: "9A:11:22:33:44:55"
        randomizeOnReconnect:
          type: boolean
          description: If true, wpa_supplicant generates a new random MAC on each reconnect
          example: true
        failoverEnabled:
          type: boolean
          description: If true, automatic failover to backupSsid is enabled when primary SSID is unreachable
          example: false
        backupSsid:
          type: string
          example: MyHome_2G
        backupWifiPassword:
          type: string
          description: Backup SSID password (masked as "••••••••" in responses)
          example: "••••••••"
        backupWifiSecurity:
          type: string
          example: WPA2-PSK
        ipCheckTimeout:
          type: integer
          description: Seconds to wait before declaring primary connection failed (failover check)
          example: 15
        primaryMaxRetries:
          type: integer
          description: Number of retries before switching to backup SSID
          example: 3
        failoverCooldown:
          type: integer
          description: Seconds to wait before attempting to reconnect to primary SSID after failover
          example: 60

    WifiScanResult:
      type: object
      required:
        - ssid
        - signal
        - security
        - channel
        - frequency
      properties:
        ssid:
          type: string
          example: MyHome_5G
        signal:
          type: integer
          minimum: 0
          maximum: 100
          example: 85
        security:
          type: string
          example: WPA2-PSK
        channel:
          type: integer
          example: 36
        frequency:
          type: string
          example: "5 GHz"

    WifiConnectionStatus:
      type: object
      required:
        - state
        - ssid
        - bssid
        - activeMac
      properties:
        state:
          type: string
          description: |
            wpa_supplicant connection state string. Common values:
            COMPLETED (connected), DISCONNECTED, SCANNING, ASSOCIATING, AUTHENTICATING,
            ASSOCIATED, 4WAY_HANDSHAKE, GROUP_HANDSHAKE, INACTIVE, INTERFACE_DISABLED.
            Mapped to user-friendly strings by the backend (e.g. COMPLETED → "Connected").
          example: COMPLETED
        ssid:
          type: string
          description: Name of the currently connected Wi-Fi network
          example: MyHome_5G
        bssid:
          type: string
          description: MAC address of the connected Access Point
          example: "00:11:22:33:44:55"
        activeMac:
          type: string
          description: The currently effective MAC address of the interface (may differ from hardware MAC if randomization is active)
          example: "4E:88:2F:BC:A1:90"
        freq:
          type: integer
          description: Connection frequency in MHz (e.g. 5180, 2412)
          example: 5745
        keyMgmt:
          type: string
          description: Security protocol in use (e.g. WPA3, WPA2, Open)
          example: WPA3
        wifiGen:
          type: string
          description: Wi-Fi generation string (e.g. WiFi 6, WiFi 5, WiFi 4)
          example: WiFi 6

    # --- Firewall Policy Schemas ---
    PolicyRule:
      type: object
      required:
        - id
        - name
