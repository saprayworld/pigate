          type: string
          example: lease-1
        ipAddress:
          type: string
          example: 192.168.1.101
        macAddress:
          type: string
          example: "99:88:77:66:55:44"
        hostname:
          type: string
          example: iPhone-13
        expiresIn:
          type: string
          example: 11 hours, 45 mins

    # --- System & Maintenance Schemas ---
    TimeStatus:
      type: object
      description: Live time state read from the kernel (read-only; never sent on PUT).
      properties:
        currentTime:
          type: string
          format: date-time
          description: Device local time (RFC3339)
          example: "2026-07-03T15:04:05+07:00"
        ntpSynchronized:
          type: boolean
          description: True once systemd-timesyncd has synchronized the clock
          example: true

    SystemTimeSettings:
      type: object
      required:
        - timezone
        - ntpSync
        - ntpServer
      properties:
        timezone:
          type: string
          description: Bare IANA timezone name (no GMT-offset suffix)
          example: "Asia/Bangkok"
        ntpSync:
          type: boolean
          example: true
        ntpServer:
          type: string
          description: NTP server hostname/IP (space-separated list allowed); empty = distro default
          example: pool.ntp.org
        status:
          allOf:
            - $ref: '#/components/schemas/TimeStatus'
          description: Live kernel status; present on GET responses only.

    SetManualTimeInput:
      type: object
      required:
        - datetime
      properties:
        datetime:
          type: string
          format: date-time
          description: Absolute time in RFC3339. Only accepted while ntpSync is false.
          example: "2026-07-03T15:04:05+07:00"

    SystemHostnameSettings:
      type: object
      required:
        - hostname
        - shareWithDhcp
      properties:
        hostname:
          type: string
          example: "PiGate-RPI5"
          description: RFC 1123 label (letters, digits, hyphens; max 63 chars; no leading/trailing hyphen)
        shareWithDhcp:
          type: boolean
          example: false
          description: When true, dhcpcd sends this hostname to the WAN DHCP server via DHCP Option 12

    BackupFile:
      type: object
      description: Configuration backup file (schema v2) produced by the export endpoint.
      required:
        - meta
        - config
      properties:
        meta:
          type: object
          properties:
            device:
              type: string
              example: PiGate Firewall Gateway
            hostname:
              type: string
              example: pigate-rpi5
            appVersion:
              type: string
              example: v0.1.0-pre
            schemaVersion:
              type: integer
              example: 2
            exportedAt:
              type: string
              format: date-time
            checksum:
              type: string
              description: SHA-256 over the canonical JSON of the plaintext `config`, prefixed with "sha256:"
              example: "sha256:7a2891..."
            includeUsers:
              type: boolean
            encrypted:
              type: boolean
              description: True when the config is passphrase-encrypted (then `config` is absent and `encryptedConfig` is present).
            encryption:
              type: object
              description: KDF/cipher parameters — present only when encrypted. Carries no secret.
              properties:
                algorithm:
                  type: string
                  example: AES-256-GCM
                kdf:
                  type: string
                  example: argon2id
                salt:
                  type: string
                  description: base64 Argon2id salt
                nonce:
                  type: string
                  description: base64 GCM nonce
                time:
                  type: integer
                memory:
                  type: integer
                threads:
                  type: integer
        encryptedConfig:
          type: string
          description: base64 AES-256-GCM ciphertext of the marshalled config. Present only when `meta.encrypted` is true (mutually exclusive with `config`).
        config:
          type: object
          description: |
            Typed configuration sections (present only when NOT encrypted). Arrays
            reuse the same item schemas as their live endpoints (interfaces,
            staticRoutes, addresses, serviceObjects, policies, dhcpConfigs,
            dhcpReservations, dnsZones, qosRules) plus singletons
            dnsServerSettings, systemDns, systemTime, systemHostname, and an
            optional users array.
          properties:
            interfaces:
              type: array
              items:
                $ref: '#/components/schemas/NetworkInterface'
            staticRoutes:
              type: array
              items:
                $ref: '#/components/schemas/StaticRoute'
            addresses:
              type: array
              items:
                $ref: '#/components/schemas/AddressObject'
            serviceObjects:
              type: array
              items:
                $ref: '#/components/schemas/ServiceObject'
            policies:
              type: array
              items:
                $ref: '#/components/schemas/PolicyRule'
            dhcpConfigs:
              type: array
              items:
                $ref: '#/components/schemas/DhcpConfig'
            dhcpReservations:
              type: array
              items:
                $ref: '#/components/schemas/DhcpReservation'
            dnsZones:
              type: array
              items:
                $ref: '#/components/schemas/DNSZone'
            dnsServerSettings:
              $ref: '#/components/schemas/DNSServerSettings'
            systemDns:
              type: object
            qosRules:
              type: array
              items:
                $ref: '#/components/schemas/QosRule'
            systemTime:
              $ref: '#/components/schemas/SystemTimeSettings'
            systemHostname:
              $ref: '#/components/schemas/SystemHostnameSettings'
            users:
              type: array
              description: Present only when exported with includeUsers. Contains bcrypt hashes.
              items:
                type: object

    ImportResult:
      type: object
      description: Summary returned after a successful configuration import.
      properties:
        schemaVersion:
          type: integer
          description: Detected schema version of the imported file (1 or 2)
          example: 2
        counts:
          type: object
          additionalProperties:
            type: integer
          description: Number of restored objects per section
        warnings:
          type: array
          items:
            type: string
          description: Non-fatal issues (skipped interfaces, kernel re-apply failures)
        interfacesChanged:
          type: boolean
          description: True if any interface config changed (admin may need to reconnect)
        usersImported:
          type: boolean

    NetworkServiceStatus:
      type: object
      required:
        - id
        - name
        - serviceName
        - status
      properties:
        id:
          type: string
          example: srv-1
        name:
          type: string
          example: Firewall Engine
        serviceName:
          type: string
          example: nftables
        status:
          type: string
          enum: [running, stopped, failed]
          example: running

    DNSConfig:
      type: object
      required:
        - mode
        - primaryDns
        - secondaryDns
        - localDomain
        - dynamicDnsServers
      properties:
        mode:
          type: string
          enum: [wan, static]
          example: static
        primaryDns:
          type: string
          example: 1.1.1.1
        secondaryDns:
          type: string
          example: 8.8.8.8
        localDomain:
          type: string
          example: pigate.local
        dynamicDnsServers:
          type: array
          items:
            $ref: '#/components/schemas/DynamicDNSServer'

    DNSConfigInput:
      type: object
      required:
        - mode
        - primaryDns
        - secondaryDns
        - localDomain
      properties:
        mode:
          type: string
          enum: [wan, static]
          example: static
        primaryDns:
          type: string
          example: 1.1.1.1
        secondaryDns:
          type: string
          example: 8.8.8.8
        localDomain:
          type: string
          example: pigate.local

    DynamicDNSServer:
      type: object
      required:
        - interfaceName
        - interfaceAlias
        - dnsServers
      properties:
        interfaceName:
          type: string
          example: eth0
        interfaceAlias:
          type: string
          example: WAN_OS
        dnsServers:
          type: array
          items:
            type: string
          example: [192.168.0.1, 8.8.4.4]

    QosRule:
      type: object
      properties:
        id:
          type: string
          example: qos-001
        name:
          type: string
          example: Limit Guest WiFi
        interface:
          type: string
          example: eth1
        matchSrcIp:
          type: string
          description: Source IP CIDR to match (empty = all)
          example: 192.168.10.0/24
        matchDstIp:
          type: string
          description: Destination IP CIDR to match (empty = all)
          example: ""
        egressRateMbps:
          type: integer
          description: Guaranteed egress (download) rate in Mbps. 0 = unlimited.
          example: 10
        egressCeilMbps:
          type: integer
          description: Burst ceiling for egress in Mbps.
          example: 20
        ingressRateMbps:
          type: integer
          description: Guaranteed ingress (upload) rate in Mbps via IFB. 0 = unlimited.
          example: 5
        ingressCeilMbps:
          type: integer
          description: Burst ceiling for ingress in Mbps.
          example: 10
        priority:
          type: integer
          description: Rule priority (lower = matched first).
          example: 10
        status:
          type: boolean
          description: Whether the rule is active.
          example: true
        description:
          type: string
          example: Bandwidth limit for guest network

    QosRuleInput:
      type: object
      required:
        - name
        - interface
      properties:
        name:
          type: string
          example: Limit Guest WiFi
        interface:
          type: string
          example: eth1
        matchSrcIp:
          type: string
          example: 192.168.10.0/24
        matchDstIp:
          type: string
          example: ""
        egressRateMbps:
          type: integer
          example: 10
        egressCeilMbps:
          type: integer
          example: 20
        ingressRateMbps:
          type: integer
          example: 5
        ingressCeilMbps:
          type: integer
          example: 10
        priority:
          type: integer
          example: 10
        status:
          type: boolean
          example: true
        description:
          type: string
          example: Bandwidth limit for guest network

    QosIfaceStatus:
      type: object
      properties:
        interface:
          type: string
          example: eth0
        hasQdisc:
          type: boolean
          example: true
        classes:
          type: array
          items:
            $ref: '#/components/schemas/QosClass'
        ingressSupported:
          type: boolean
          description: >-
            Whether the kernel has the IFB module available (probed once at
            startup). When false, ingress (upload) shaping is skipped and only
            egress (download) QoS is applied; the UI warns the user.
          example: true

    QosClass:
      type: object
      properties:
        classId:
          type: string
          example: "1:10"
        rate:
          type: string
          example: 10Mbit
        ceil:
          type: string
          example: 20Mbit
        ruleName:
          type: string
          example: Limit Guest WiFi
