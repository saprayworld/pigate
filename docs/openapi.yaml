        assigns the canonical ID `dhcp-cfg-<interface>`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DhcpConfig'
      responses:
        '200':
          description: DHCP configuration created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DhcpConfig'
        '400':
          $ref: '#/components/responses/BadRequest'

  /dhcp/configs/{id}:
    put:
      tags:
        - DHCP Server
      summary: Update a per-interface DHCP configuration by ID
      description: The `id` in the path always wins over any `id` in the request body.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DhcpConfig'
      responses:
        '200':
          description: DHCP configuration updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DhcpConfig'
        '400':
          $ref: '#/components/responses/BadRequest'
    delete:
      tags:
        - DHCP Server
      summary: Delete a per-interface DHCP configuration
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: DHCP configuration deleted
          content:
            application/json:
              schema:
                type: boolean
                example: true

  /dhcp/configs/{id}/toggle:
    post:
      tags:
        - DHCP Server
      summary: Toggle a per-interface DHCP configuration enabled/disabled
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Enabled state toggled
          content:
            application/json:
              schema:
                type: boolean
                example: true

  /dhcp/interfaces:
