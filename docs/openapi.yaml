          type: boolean
          example: true

    # --- Port Forwarding (DNAT) Schemas ---
    PortForward:
      type: object
      required:
        - id
        - name
        - inInterface
        - externalPort
        - protocol
        - internalIP
        - status
      properties:
        id:
          type: string
          example: pf-a1b2
        name:
          type: string
          example: WebServer
        inInterface:
          type: string
          description: External (WAN) interface receiving the traffic
          example: eth0
        externalPort:
          type: string
          description: Single port ("8080") or range ("8000-8010", keep-port only)
          example: '8080'
        protocol:
          type: string
          enum: [tcp, udp]
          example: tcp
        internalIP:
          type: string
          description: Internal LAN target IPv4 address
          example: 192.168.1.10
        internalPort:
          type: string
          description: Translated destination port; empty keeps the original port (required-empty for ranges)
          example: '80'
        status:
          type: boolean
          example: true

    PortForwardInput:
      type: object
      required:
        - name
        - inInterface
        - externalPort
        - protocol
        - internalIP
        - status
      properties:
        name:
          type: string
          example: WebServer
        inInterface:
          type: string
          example: eth0
        externalPort:
          type: string
          example: '8080'
        protocol:
          type: string
          enum: [tcp, udp]
          example: tcp
        internalIP:
          type: string
          example: 192.168.1.10
        internalPort:
          type: string
          example: '80'
        status:
          type: boolean
          example: true

