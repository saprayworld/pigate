    # --- DNS Server Schemas ---
    DNSZone:
      type: object
      required:
        - id
        - zoneName
        - forwardTo
        - allowedIps
        - isAuthoritative
        - enabled
        - records
      properties:
        id:
          type: string
          example: zone-a1b2c3d4
        zoneName:
          type: string
          description: Domain suffix this zone matches (e.g. lan, corp.local)
          example: home.lan
        forwardTo:
          type: string
          description: Upstream DNS server IP to forward queries for this zone to. Empty for authoritative zones.
          example: 192.168.1.53
        allowedIps:
          type: string
          description: Optional client IP/CIDR restriction for this zone (empty = all clients).
          example: 192.168.1.0/24
        isAuthoritative:
          type: boolean
          description: >-
            True marks this as a local zone: dnsmasq answers it from the zone's own
            records (`local=/zone/`) and returns NXDOMAIN for unknown names instead
            of forwarding upstream. False makes it a forward zone (queries are sent
            to forwardTo). The field name is retained for API compatibility.
          example: true
        enabled:
          type: boolean
          example: true
        records:
          type: array
          items:
            $ref: '#/components/schemas/DNSRecord'

    DNSZoneInput:
      type: object
      required:
        - zoneName
        - isAuthoritative
        - enabled
      properties:
        zoneName:
          type: string
          description: >-
            Zone name. Allowed characters: letters, digits, '.' and '-' only
            (no spaces, underscores or newlines). Invalid values are rejected
            with 400 (guards against dnsmasq config injection).
          example: home.lan
        forwardTo:
          type: string
          description: >-
            Upstream resolver for a forward zone (IPv4/IPv6, optional '#port',
            or hostname). Charset-validated; invalid values return 400.
          example: 192.168.1.53
        allowedIps:
          type: string
          example: 192.168.1.0/24
        isAuthoritative:
          type: boolean
          example: true
        enabled:
          type: boolean
          example: true

    DNSRecord:
      type: object
      required:
        - id
        - zoneId
        - name
        - type
        - value
        - ttl
      properties:
        id:
          type: string
          example: rec-a1b2c3d4
        zoneId:
          type: string
          description: ID of the zone this record belongs to (immutable).
          example: zone-a1b2c3d4
        name:
          type: string
          description: Record host name (relative to the zone or FQDN).
          example: nas
        type:
          type: string
          description: DNS record type (e.g. A, AAAA, CNAME, MX, TXT).
          example: A
        value:
          type: string
          example: 192.168.1.50
        ttl:
          type: integer
          description: Time-to-live in seconds.
          example: 3600

    DNSRecordInput:
      type: object
      required:
        - name
        - type
        - value
        - ttl
      properties:
        name:
          type: string
          description: >-
            Host name relative to the zone ('@' or empty = zone apex). Allowed
            characters: letters, digits, '.' and '-'. Invalid values return 400.
          example: nas
        type:
          type: string
          description: One of A, AAAA, CNAME, MX, TXT, PTR. Any other type is rejected with 400.
          example: A
        value:
          type: string
          description: >-
            Validated per type (A=IPv4, AAAA=IPv6, CNAME/PTR=FQDN charset,
            MX="<pref> <target>" or "<target>", TXT<=255 chars, no quotes).
            Values with newlines/invalid charset return 400 (dnsmasq injection guard).
          example: 192.168.1.50
        ttl:
          type: integer
          example: 3600

    DNSServerSettings:
      type: object
      required:
        - interfaces
      properties:
        interfaces:
          type: array
          description: Names of the real interfaces the DNS server binds (listens) on.
          items:
            type: string
          example: [eth0, wlan0]

    # --- Static Route Schemas ---
    RoutesConfig:
      type: object
      description: Backend runtime flags controlling routing behavior
      required:
        - allowEditSystemRoutes
        - prioritizeKernelRoutes
        - enableEditSystemRoute
      properties:
        allowEditSystemRoutes:
          type: boolean
          description: |
            When true, routes of type 'system' (directly connected kernel routes) can be
            edited, deleted, or toggled. Controlled by the `-allow-edit-system-routes` CLI flag.
          example: false
        prioritizeKernelRoutes:
          type: boolean
          description: |
            [Experimental] When true, the kernel routing table (/proc/net/route) is the source of truth.
            Routes found in kernel have their metric and type updated from kernel data.
            Routes NOT in kernel (system/defaultgateway types) are automatically marked inactive.
            User-toggled status in DB is preserved and not overridden by kernel state.
            Controlled by the `-prioritize-kernel-routes` CLI flag. (Default: false)
          example: false
        enableEditSystemRoute:
          type: boolean
          description: |
            Runtime active state of system route editing. Reflects whether the user has currently
            toggled the system route edit mode on. This is the live state used by the RoutingService,
            and may be false even when allowEditSystemRoutes is true.
          example: false

    StaticRoute:
      type: object
      required:
        - id
        - destination
        - gateway
        - interface
        - metric
        - description
        - status
        - type
        - scope
        - src
        - proto
      properties:
        id:
          type: string
          description: |
            For user-created routes: UUID (e.g. `route-1`).
            For kernel-only routes not yet in DB: canonical ID `route-sys-[dest]-[gw]-[iface]`.
          example: route-1
        destination:
          type: string
          example: 0.0.0.0/0
        gateway:
          type: string
          description: Next-hop gateway IP. Empty string for directly connected (system) routes.
          example: 10.0.0.1
        interface:
          type: string
          example: wlan0
        metric:
          type: integer
          description: Route priority. Lower value = higher priority. Synced from kernel when prioritizeKernelRoutes is true.
          example: 100
        description:
          type: string
          example: Default gateway route (WAN)
        status:
          type: boolean
          description: |
            Whether the route is enabled. Stored in DB and preserved across GetRoutes calls.
            For system/defaultgateway types: auto-set to false if route not found in kernel.
          example: true
        type:
          type: string
          enum: [system, custom, defaultgateway, customgateway]
          description: |
            - `system`: directly connected route (no gateway), read-only unless -allow-edit-system-routes is set
            - `defaultgateway`: route to 0.0.0.0/0, always editable and toggleable
            - `custom`: user-defined route, always editable and toggleable
            - `customgateway`: user-defined route with gateway, always editable and toggleable
          example: defaultgateway
        scope:
          type: string
          description: Route scope (e.g. 'global', 'link', 'host').
          example: global
        src:
          type: string
          description: Preferred source IP address.
          example: 192.168.1.2
        proto:
          type: string
          description: Route protocol (e.g. 'kernel', 'boot', 'static', '120').
          example: static

    StaticRouteInput:
      type: object
      required:
        - destination
        - gateway
        - interface
        - metric
        - description
        - status
        - scope
        - src
        - proto
      properties:
        destination:
          type: string
          example: 192.168.10.0/24
        gateway:
          type: string
          example: 192.168.1.250
        interface:
          type: string
          example: eth0
        metric:
          type: integer
          example: 10
        description:
          type: string
          example: Connection route to branch office
        status:
          type: boolean
          example: true
        scope:
          type: string
          description: Route scope (e.g. 'global', 'link', 'host').
          example: global
        src:
          type: string
          description: Preferred source IP address.
          example: 192.168.1.2
        proto:
          type: string
          description: Route protocol (e.g. 'kernel', 'boot', 'static', '120').
          example: static

    # --- DHCP Server Schemas ---
    DhcpConfig:
      type: object
      required:
        - enabled
        - interface
        - startIp
        - endIp
        - gateway
