        enabled:
          type: boolean
          example: true
        interface:
          type: string
          example: eth0
        startIp:
          type: string
          example: 192.168.1.100
        endIp:
          type: string
          example: 192.168.1.200
        gateway:
          type: string
          example: 192.168.1.1
        netmask:
          type: string
          example: 255.255.255.0
        dns1:
          type: string
          example: 8.8.8.8
        dns2:
          type: string
          example: 1.1.1.1
        leaseTime:
          type: integer
          description: Lease duration in seconds
          example: 86400

    DhcpReservation:
      type: object
      required:
        - id
        - deviceName
        - macAddress
        - ipAddress
      properties:
        id:
          type: string
          example: res-1
        deviceName:
          type: string
          example: CEO_Laptop
        macAddress:
          type: string
          example: "A1:B2:C3:D4:E5:F6"
        ipAddress:
          type: string
          example: 192.168.1.10

    DhcpReservationInput:
      type: object
      required:
        - deviceName
        - macAddress
        - ipAddress
      properties:
        deviceName:
          type: string
          description: >-
            Device name written to dnsmasq as the reservation hostname. Letters,
            digits, spaces (collapsed to '-') and '-' only, max 63 chars; may be
            empty (a default is used). Invalid values return 400.
          example: CEO_Laptop
        macAddress:
          type: string
          description: Colon- or hyphen-separated 6-octet MAC. Invalid values return 400.
          example: "A1:B2:C3:D4:E5:F6"
        ipAddress:
          type: string
          description: Reserved IPv4/IPv6 address. Invalid values return 400.
