            type: string
          example: [ALL]
        action:
          type: string
          enum: [ACCEPT, DROP]
          example: DROP
        log:
          type: boolean
          example: true
        nat:
          type: boolean
          description: Source NAT (masquerade to outgoing interface address)
          example: false
        status:
          type: boolean
