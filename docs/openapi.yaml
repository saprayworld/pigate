openapi: 3.0.0
info:
  title: PiGate API Specification
  description: >-
    API endpoints for PiGate - Raspberry Pi 5 Firewall & Gateway Controller. This spec is synchronized with the React frontend service layer.
    Request bodies are capped at 1 MB on every endpoint (a request that exceeds this fails with a 4xx), except POST /system/config/import which allows up to 10 MB for backup files.
  version: 1.0.0
servers:
  - url: http://localhost:2479/api
    description: Development server (default port, mock mode)
  - url: /api
    description: Production (same-origin — HTTPS on real devices)
  - url: https://pigate.local/api
    description: Production HTTPS (self-signed; replace host with the device IP/hostname)

security:
  - cookieAuth: []

paths:
  # =========================================================================
  # AUTHENTICATION
  # =========================================================================
  /auth/login:
    post:
      tags:
        - Authentication
      summary: Administrator login
      security: [] # No auth required
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  example: admin
                password:
                  type: string
                  format: password
                  example: admin
      responses:
        '200':
          description: |
            Login successful. The session token is delivered ONLY via the
            `Set-Cookie: pigate_session=...` response header (HttpOnly, Secure
            over HTTPS, SameSite=Strict) — it is never returned in the body.

            Session lifetime (server-enforced): a 15-minute idle TTL that slides
            forward on use (any authenticated request within ~7.5 min of expiry
            re-issues the cookie with a fresh deadline), capped by a 7-day
            absolute maximum from login. A user may hold at most 5 concurrent
            sessions; a 6th login evicts that user's oldest session. Separately,
            the web UI auto-logs-out after 5 minutes of no mouse/keyboard
            activity, calling POST /auth/logout to revoke the session immediately.
          headers:
            Set-Cookie:
              description: HttpOnly session cookie carrying the session token.
              schema:
                type: string
                example: pigate_session=session_id_abc123xyz; Path=/; HttpOnly; Secure; SameSite=Strict
          content:
            application/json:
              schema:
                type: object
                properties:
                  mustChangePassword:
                    type: boolean
                    description: If true, user must change password before using other API endpoints
                    example: false
                  role:
                    type: string
                    enum: [super_admin, admin_readonly]
                    description: Role of the authenticated user; the frontend uses it to adjust the UI.
                    example: super_admin
        '401':
          description: Invalid username or password, or the account is disabled
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Invalid username or password

  /auth/session:
    get:
      tags:
        - Authentication
      summary: Check current session validity and user context
      description: |
        Verifies that the current session cookie (pigate_session) is still valid on the backend.
        A session is invalid once it has expired server-side (15-minute sliding idle TTL, or the
        7-day absolute cap), was evicted by the per-user session cap, or was revoked by logout —
        all of which return 401 here. A valid session may also be renewed as a side effect (a
        fresh Set-Cookie), since this route passes through the auth middleware.
        Also returns whether the user must change their password (IsInitial check).
        If mustChangePassword is true, all other API endpoints (except /system/password) will return 403 Forbidden.
      responses:
        '200':
          description: Session is valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                    example: true
                  username:
                    type: string
                    example: pigate
                  role:
                    type: string
                    enum: [super_admin, admin_readonly]
                    example: super_admin
                  mustChangePassword:
                    type: boolean
                    example: false
        '401':
          description: |
            Session invalid, revoked, or expired server-side (idle TTL / absolute
            cap / per-user cap eviction). The frontend clears its UI hints and
            redirects to /login.

  /auth/logout:
    post:
      tags:
        - Authentication
      summary: Log out from the system
      description: Invalidates the current session token and clears the session cookie.
      responses:
        '200':
          description: Logout successful

  # =========================================================================
  # USER MANAGEMENT (super_admin only)
  # =========================================================================
  /users:
    get:
      tags:
        - User Management
      summary: List all user accounts
      description: Restricted to super_admin. Password hashes are never returned.
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '403':
          description: Caller is not a super_admin
    post:
      tags:
        - User Management
      summary: Create a new user
      description: Restricted to super_admin. New users always start with is_initial=true.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Validation failure or duplicate username
        '403':
          description: Caller is not a super_admin

  /users/{id}:
    put:
      tags:
        - User Management
      summary: Update a user's role and optionally reset password
      description: |
        Restricted to super_admin. Setting `password` resets it and forces a
        change on next login. Username is immutable. Guard rails: you cannot
        demote yourself, and the system must always keep at least one active
        super_admin.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated
        '400':
          description: Validation failure or guard-rail violation
        '403':
          description: Caller is not a super_admin
        '404':
          description: User not found
    delete:
      tags:
        - User Management
      summary: Delete a user
      description: |
        Restricted to super_admin. You cannot delete yourself, nor the last
        active super_admin.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User deleted
        '400':
          description: Guard-rail violation (self-delete or last super_admin)
        '403':
          description: Caller is not a super_admin
        '404':
          description: User not found

  /users/{id}/toggle:
    post:
      tags:
        - User Management
      summary: Toggle a user between active and disabled
      description: |
        Restricted to super_admin. You cannot disable yourself, nor the last
        active super_admin. Disabling a user immediately evicts their sessions.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Status toggled
        '400':
          description: Guard-rail violation (self-disable or last super_admin)
        '403':
          description: Caller is not a super_admin
        '404':
          description: User not found

  # =========================================================================
  # DASHBOARD
  # =========================================================================
  /dashboard/stats:
    get:
      tags:
        - Dashboard
      summary: Get general dashboard metrics and summary status
      responses:
        '200':
          description: General stats retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardStats'

  /dashboard/performance:
    get:
      tags:
        - Dashboard
      summary: Get live hardware performance metrics (CPU, RAM, Temp)
      responses:
        '200':
          description: Performance metrics retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PerformanceMetrics'

  /dashboard/traffic:
    get:
      tags:
        - Dashboard
      summary: Get WAN bandwidth history (RAM ring buffer, ~24h of 5-minute buckets)
      description: >
        Returns rx/tx byte deltas bucketed in 5-minute intervals for the WAN
        interface(s). The history lives only in RAM and resets on reboot, so
        immediately after boot only a few buckets are present — the client must
        cope with a short series.
      responses:
        '200':
          description: Traffic history retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrafficHistory'

  /dashboard/logs:
    get:
      tags:
        - Dashboard
      summary: Get recent firewall filter packet logs (nftables block logs)
      responses:
        '200':
          description: List of firewall logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FirewallLog'

  /dashboard/logs/clear:
    post:
      tags:
        - Dashboard
      summary: Clear all firewall packet filter logs
      responses:
        '200':
          description: Logs cleared successfully

  /dashboard/logs/stream:
    get:
      tags:
        - Dashboard
      summary: Server-Sent Events (SSE) stream for live firewall block logs
      description: Establishes a text/event-stream connection to push live firewall logs.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: SSE stream initiated
          headers:
            Content-Type:
              schema:
                type: string
                example: text/event-stream
            Cache-Control:
              schema:
                type: string
                example: no-cache
            Connection:
              schema:
                type: string
                example: keep-alive

  # =========================================================================
  # CENTRAL EVENT LOG (audit trail)
  # =========================================================================

  /logs/events:
    get:
      tags:
        - Event Log
      summary: Get central system/audit events (newest first)
      description: |
        Central event log covering security events (login success/failed,
        password changed, user CRUD), network/firewall/route/DHCP/DNS changes,
        config import/export, and reboot/shutdown. Persisted in SQLite across
        reboots. Available to any authenticated role.
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [auth, user, network, firewall, route, dhcp, dns, qos, system, config]
          description: Filter by event category
        - name: severity
          in: query
          schema:
            type: string
            enum: [info, warning, error, critical]
          description: Filter by severity
        - name: q
          in: query
          schema:
            type: string
          description: Case-insensitive text search across message, action, actor, and target
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
          description: Page size (max 200)
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
          description: Pagination offset
      responses:
        '200':
          description: Matching events plus total count for pagination
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items:
                      $ref: '#/components/schemas/SystemEvent'
                  total:
                    type: integer
                    example: 1234
        '401':
          $ref: '#/components/responses/Unauthorized'

  /logs/events/clear:
    post:
      tags:
        - Event Log
      summary: Clear the entire event log (super_admin only)
      description: |
        Destroys the audit trail, so it is restricted to super_admin and blocked
        in -disable-edit mode. The first row of the emptied table is always a
        `config.logs_cleared` event recording who performed the wipe.
      responses:
        '200':
          description: Event log cleared (a logs_cleared audit event is written immediately)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Caller is not super_admin

  # =========================================================================
  # FORWARD TRAFFIC LOG (live packet PASS/DROP, RAM-only)
  # =========================================================================

  /logs/traffic:
    get:
      tags:
        - Event Log
      summary: Get live forward-chain packet logs (PASS/DROP, newest first)
      description: |
        Real-time PASS/DROP events for packets forwarded through the firewall
        (LAN↔WAN forward chain), captured from the kernel via NFLOG into a
        fixed-size RAM ring buffer. Deliberately NOT persisted to SQLite (packet
        rate + SD-card wear), so it is a recent-sample view, not a complete
        record. Shares the buffer with `/dashboard/logs`; clear it via
        `/dashboard/logs/clear`. Established connections are accepted without a
        log (ct state), so mostly connection-opening and dropped packets appear.
        Available to any authenticated role.
      parameters:
        - name: action
          in: query
          schema:
            type: string
            enum: [PASS, DROP]
          description: Filter by verdict (case-insensitive); omit for all
        - name: q
          in: query
          schema:
            type: string
          description: Case-insensitive text search across src, dest, port, proto, and reason
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
          description: Max rows to return (capped at the buffer capacity)
      responses:
        '200':
          description: Matching forward-traffic logs (newest first)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FirewallLog'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # =========================================================================
  # NETWORK INTERFACES
  # =========================================================================
  /interfaces:
    get:
      tags:
        - Network Interfaces
      summary: Get all network interfaces (Ethernet & Wireless)
      description: >-
        Returns the unified data layer (kernel state overlaid with database configuration).
        The list also includes "offline" interfaces: rows that have a database configuration
        but no live kernel link (status="offline", managed=true), so the UI can surface them
        and offer to delete their config. Other backend consumers do not see offline rows.
      responses:
        '200':
          description: List of interfaces
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NetworkInterface'

  /interfaces/vlan:
    post:
      tags:
        - Network Interfaces
      summary: Create an 802.1Q VLAN sub-interface
      description: |
        Creates a VLAN (802.1Q) sub-interface on top of an existing ethernet parent via
        Netlink (no shell execution). The resulting link is always named
        "<parent>.<vlanId>" (e.g. "eth0.100"). The parent must be an existing, non-VLAN
        ethernet interface (wireless parents are rejected). The VLAN is persisted to the
        database and re-created automatically on every boot, so it survives reboots.
        Requires super_admin (blocked for read-only users and in -disable-edit mode).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - parent
                - vlanId
              properties:
                parent:
                  type: string
                  description: Parent ethernet interface name (must exist, non-VLAN)
                  example: eth0
                vlanId:
                  type: integer
                  minimum: 1
                  maximum: 4094
                  example: 100
                alias:
                  type: string
                  description: >-
                    Optional display alias (defaults to the link name). Same rules as
                    PUT /interfaces/{id}: unique case-insensitively, must not equal
                    another interface's OS name.
                  example: vlan100
                role:
                  type: string
                  enum: [LAN, WAN]
                  example: LAN
                addressingMode:
                  type: string
                  enum: [dhcp, static]
                  example: static
                ip:
                  type: string
                  example: 192.168.100.1
                netmask:
                  type: string
                  example: "24"
                gateway:
                  type: string
                  example: ""
                adminAccess:
                  type: array
                  items:
                    type: string
                    enum: [HTTPS, HTTP, PING, SSH]
                  example: [PING, HTTP, SSH]
      responses:
        '201':
          description: VLAN interface created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworkInterface'
        '400':
          description: Invalid input (bad VLAN ID, missing/invalid parent, wireless parent, malformed alias, etc.)
        '403':
          description: Forbidden (read-only user or -disable-edit mode)
        '409':
          description: A VLAN with that name already exists (in the kernel or database), or the alias is already in use
        '500':
          description: Internal server error (kernel link creation or DB write failed)

  /interfaces/{id}:
    put:
      tags:
        - Network Interfaces
      summary: Full update of a network interface configuration
      description: |
        Replaces the full configuration of an interface. For password fields (wifiPassword, backupWifiPassword),
        if the masked placeholder "••••••••" is sent, the existing stored password is preserved.
        Wi-Fi passwords are only updated if non-empty and not masked, or if security is explicitly "Open".
        If adminAccess changes, firewall rules are automatically re-synced.
        The dhcpcd client is reconciled to the saved addressing mode: switching to DHCP on an up
        interface (re)starts dhcpcd immediately (Wi-Fi once associated), and switching to static
        releases any running lease — no manual interface toggle is required.
        The alias is validated server-side: an empty alias defaults to the OS name; a
        malformed alias returns 400; an alias already used by another interface
        (case-insensitive) or equal to another interface's OS name returns 409.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NetworkInterface'
      responses:
        '200':
          description: Interface updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworkInterface'
        '400':
          description: Invalid alias (must contain only letters, numbers and underscores)
        '404':
          description: Interface not found
        '409':
          description: >-
            Alias already in use by another interface, or equals another interface's OS name
            (case-insensitive); or the interface is offline (has no live kernel link), in which
            case only delete is allowed.
        '500':
          description: Internal server error or OS firewall sync failed
    patch:
      tags:
        - Network Interfaces
      summary: Partial update of a network interface configuration
      description: |
        Applies partial (PATCH) updates to an interface. Only fields explicitly present in the request body
        are updated; omitted fields are left unchanged. Useful for changing a single property without
        sending the full interface payload.
        Password masking rules are identical to PUT.
        Alias validation rules are identical to PUT (400 malformed / 409 conflict).
        If adminAccess changes, firewall rules are automatically re-synced.
        The dhcpcd client is reconciled to the saved addressing mode: switching to DHCP on an up
        interface (re)starts dhcpcd immediately (Wi-Fi once associated), and switching to static
        releases any running lease — no manual interface toggle is required.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                alias:
                  type: string
                role:
                  type: string
                  enum: [LAN, WAN]
                addressingMode:
                  type: string
                  enum: [dhcp, static]
                ip:
                  type: string
                netmask:
                  type: string
                gateway:
                  type: string
                macAddress:
                  type: string
                status:
                  type: string
                  enum: [up, down]
                adminAccess:
                  type: array
                  items:
                    type: string
                    enum: [HTTPS, HTTP, PING, SSH]
                wifiSSID:
                  type: string
                wifiPassword:
                  type: string
                wifiSecurity:
                  type: string
                macMode:
                  type: string
                  enum: [hardware, randomized, laa]
                laaMacAddress:
                  type: string
                randomizeOnReconnect:
                  type: boolean
                failoverEnabled:
                  type: boolean
                backupSsid:
                  type: string
                backupWifiPassword:
                  type: string
                backupWifiSecurity:
                  type: string
                ipCheckTimeout:
                  type: integer
                primaryMaxRetries:
                  type: integer
                failoverCooldown:
                  type: integer
      responses:
        '200':
          description: Interface partially updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworkInterface'
        '400':
          description: Invalid alias (must contain only letters, numbers and underscores)
        '404':
          description: Interface not found
        '409':
          description: >-
            Alias already in use by another interface, or equals another interface's OS name
            (case-insensitive); or the interface is offline (has no live kernel link), in which
            case only delete is allowed.
        '500':
          description: Internal server error or OS firewall sync failed
    delete:
      tags:
        - Network Interfaces
      summary: Delete an interface
      description: >-
        Deletes an interface configuration. For physical interfaces, only offline interfaces
        (status="offline" — a database row whose kernel link is gone) can be deleted; active
        interfaces return a 400 Bad Request. Deleting the row also prunes any DNS Server
        binding to the interface. VLAN sub-interfaces (subtype='vlan') are an exception: they
        are removed via Netlink (kernel link + database row) and can be deleted while up,
        since that is the only way to tear a VLAN down; when the VLAN's kernel link is already
        gone the Netlink delete is skipped and only the database row is removed. The kernel
        layer additionally guards against deleting a non-VLAN link.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Interface deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        '400':
          description: Cannot delete active interfaces
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Cannot delete active interfaces. Only offline interfaces can be deleted.
        '404':
          description: Interface not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Interface not found
        '500':
          description: Internal server error

  /interfaces/{id}/toggle:
    post:
      tags:
        - Network Interfaces
      summary: Toggle interface status UP or DOWN (ifconfig up/down)
      description: >-
        Toggles the interface's administrative state. On the UP leg the interface is
        brought up and its stored configuration (static IP, default gateway route, and
        metric) is reapplied from the database, so a static gateway/metric that was
        deferred while the link was down is restored. Status is persisted with a targeted
        update; toggling an unmanaged interface (no database row) does not create one.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Toggle state changed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworkInterface'
        '409':
          description: Interface is offline (has no live kernel link); only delete is allowed
  /interfaces/{id}/reset:
    post:
      tags:
        - Network Interfaces
      summary: Reset interface configuration to default values
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Interface reset successful, returns default configurations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworkInterface'
        '404':
          description: Interface not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Interface not found
        '500':
          description: Internal server error

  /interfaces/{id}/scan:
    get:
      tags:
        - Network Interfaces
      summary: Scan for available Wi-Fi access points (Wireless interfaces only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Wi-Fi scan results retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WifiScanResult'
        '409':
          description: Interface is offline (has no live kernel link); only delete is allowed

  /interfaces/{id}/wifi-status:
    get:
      tags:
        - Network Interfaces
      summary: Retrieve the live real-time Wi-Fi connection status (Wireless interfaces only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Wi-Fi connection status retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WifiConnectionStatus'
        '400':
          description: Interface is not wireless
        '404':
          description: Interface not found
        '409':
          description: Interface is offline (has no live kernel link); only delete is allowed

  # =========================================================================
  # FIREWALL POLICIES
  # =========================================================================
  /policies:
    get:
      tags:
        - Firewall Policies
      summary: Retrieve all firewall policy rules ordered by precedence
      responses:
        '200':
          description: List of policy rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PolicyRule'
    post:
      tags:
        - Firewall Policies
      summary: Create a new firewall policy rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyRuleInput'
      responses:
        '200':
          description: Policy created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyRule'

  /policies/{id}:
    put:
      tags:
        - Firewall Policies
      summary: Update an existing firewall policy rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyRuleInput'
      responses:
        '200':
          description: Policy updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyRule'
    delete:
      tags:
        - Firewall Policies
      summary: Delete a firewall policy rule
