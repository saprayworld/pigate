  /dns/apply:
    post:
      tags:
        - DNS Server
      summary: Apply DNS server configuration (regenerate dnsmasq config, restart daemon, re-sync firewall)
      responses:
        '200':
          description: DNS server configuration applied
          content:
            application/json:
              schema:
                type: boolean
                example: true

  /dns/clear-cache:
    post:
      tags:
        - DNS Server
      summary: Clear the dnsmasq DNS resolver cache
      responses:
        '200':
          description: DNS cache cleared
          content:
            application/json:
              schema:
                type: boolean
                example: true

  /dns/settings:
    get:
      tags:
        - DNS Server
      summary: Get the interfaces the DNS server is bound to
      responses:
        '200':
          description: DNS server listen-interface settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DNSServerSettings'
    put:
      tags:
        - DNS Server
      summary: Set the interfaces the DNS server should listen on
      description: |
        These interfaces are the ones dnsmasq actually listens for DNS on: applying
        the DNS config emits an `interface=<name>` line per selected interface (using
        dnsmasq `bind-dynamic`), so the DNS server works without any DHCP server
        enabled. A selected interface that is missing is harmless — dnsmasq binds it
        automatically if it later appears (no re-apply needed).

        Tolerates dangling references: names already saved are accepted even if the
        interface no longer exists on the device (e.g. a deleted VLAN), so they can be
        kept or removed without error. Only names newly added in the request are
        validated against the live interfaces; unknown new names are rejected.
        Independent from the DHCP server configuration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DNSServerSettings'
      responses:
        '200':
          description: Settings saved (echoes the stored settings)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DNSServerSettings'
        '400':
          $ref: '#/components/responses/BadRequest'

  # =========================================================================
  # SYSTEM & MAINTENANCE
  # =========================================================================
  /system/info:
    get:
      tags:
        - System & Maintenance
      summary: Get host identity for the dashboard System Information card
      description: >
        Composes hostname (via hostnamed), PiGate build version, OS base
        (/etc/os-release), board model (/proc/device-tree/model, Pi only),
        kernel version, uptime, and current system time + timezone. boardModel
        and kernelVersion are omitted when unreadable (e.g. on x86/WSL).
      responses:
        '200':
          description: System information retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemInfo'

  /system/time:
    get:
      tags:
        - System & Maintenance
      summary: Get timezone and NTP network time synchronization configuration
      responses:
        '200':
          description: System time settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemTimeSettings'
    put:
      tags:
        - System & Maintenance
      summary: Save timezone and NTP server configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystemTimeSettings'
      responses:
        '200':
          description: Time settings updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemTimeSettings'
        '400':
          description: Invalid timezone or NTP server value

  /system/time/manual:
    post:
      tags:
        - System & Maintenance
      summary: Set the wall clock manually (only allowed while NTP sync is disabled)
      description: >
        Sets the device clock to an absolute time via systemd-timedated. Rejected
        with 400 if NTP sync is currently enabled, or if the datetime is malformed
        or its year is outside 2020–2100. The time is runtime-only and never
        persisted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetManualTimeInput'
      responses:
        '200':
          description: Clock updated; returns the refreshed time settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemTimeSettings'
        '400':
          description: NTP sync is enabled, or datetime is invalid/out of range

  /system/hostname:
    get:
      tags:
        - System & Maintenance
      summary: Get device hostname and DHCP hostname-sharing setting
      responses:
        '200':
          description: System hostname settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemHostnameSettings'
    put:
      tags:
        - System & Maintenance
      summary: Set device hostname and/or toggle sharing it with the WAN DHCP server (Option 12)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystemHostnameSettings'
      responses:
        '200':
          description: Hostname settings updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemHostnameSettings'
        '400':
          description: Invalid hostname (RFC 1123 label validation failed)

  /system/dns:
    get:
      tags:
        - System & Maintenance
      summary: Get system-wide DNS configuration
      responses:
        '200':
          description: System DNS settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DNSConfig'
    put:
      tags:
        - System & Maintenance
      summary: Update system-wide DNS configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DNSConfigInput'
      responses:
        '200':
          description: DNS configuration updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DNSConfigInput'

  /system/password:
    put:
      tags:
        - System & Maintenance
      summary: Change administrator dashboard login password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
              properties:
                currentPassword:
                  type: string
                  format: password
                newPassword:
                  type: string
                  format: password
      responses:
        '200':
          description: Password updated successfully
        '400':
          description: Current password incorrect or validation failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: รหัสผ่านปัจจุบันไม่ถูกต้อง

  /system/services:
    get:
      tags:
        - System & Maintenance
      summary: Get statuses of critical network service daemons (nftables, isc-dhcp-server, NetworkManager, dnsmasq)
      description: Currently returns mock data — the statuses are hardcoded, not read from systemd.
      responses:
        '200':
          description: Services status list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NetworkServiceStatus'

  /system/services/{id}/restart:
    post:
      tags:
        - System & Maintenance
      summary: Restart a system service daemon by service ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Service restart command executed

  /system/reboot:
    post:
      tags:
        - System & Maintenance
      summary: Reboot the Raspberry Pi 5 board host — super_admin only
      security:
        - cookieAuth: []
      description: |
        Restarts the physical board via org.freedesktop.login1 (systemd-logind)
        over D-Bus — no shell execution. Restricted to super_admin; a read-only
        admin receives 403. Responds 200 immediately, then the board begins a
        graceful reboot ~1 second later, so the client should expect the
        connection to drop shortly after the response.
      responses:
        '200':
          description: Reboot accepted; board restarts within ~1 second
        '403':
          description: Forbidden — caller is not super_admin

  /system/shutdown:
    post:
      tags:
        - System & Maintenance
      summary: Shutdown/halt the Raspberry Pi 5 board host — super_admin only
      security:
        - cookieAuth: []
      description: |
        Powers off the physical board via org.freedesktop.login1 (systemd-logind)
        over D-Bus — no shell execution. Restricted to super_admin; a read-only
        admin receives 403. Responds 200 immediately, then the board begins a
        graceful power-off ~1 second later. Powering the board back on requires
        physical intervention.
      responses:
        '200':
          description: Shutdown accepted; board halts within ~1 second
        '403':
          description: Forbidden — caller is not super_admin

  /system/config/export:
    get:
      tags:
        - System & Maintenance
      summary: Export full configuration backup (schema v2) — super_admin only
      security:
        - cookieAuth: []
      description: |
        Returns a complete, typed JSON backup (schema v2) of all persisted
        configuration: interfaces, raw static routes (gateway "default" kept
        verbatim), address/service objects, firewall policies, per-interface DHCP
        configs, DHCP reservations, DNS zones+records, DNS server listen
        interfaces, system DNS, QoS rules, system time, and hostname.

        Runtime/live state (DHCP leases, live time status, firewall counters) is
        excluded by design.

        **super_admin only.** The payload contains real Wi-Fi passwords and,
        when `includeUsers=1`, user credential hashes — a read-only admin gets
        `403`. `meta.checksum` is a SHA-256 over the canonical config, so a
        reformatted file still verifies on import. Also available in
        `-disable-edit` (read-only) mode.
      parameters:
        - name: includeUsers
          in: query
          required: false
          schema:
            type: string
            enum: ["1", "true"]
          description: When set, embeds the users table (including bcrypt hashes).
        - name: X-Backup-Passphrase
          in: header
          required: false
          schema:
            type: string
          description: When provided, the config section is AES-256-GCM encrypted with an Argon2id-derived key. Sent as a header (not query) to keep it out of access logs.
      responses:
        '200':
          description: Configuration backup payload (schema v2)
          headers:
            Content-Disposition:
              schema:
                type: string
              description: 'attachment; filename="pigate-backup-<hostname>-<timestamp>.json"'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackupFile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Forbidden — requires super_admin

  /system/config/import:
    post:
      tags:
        - System & Maintenance
      summary: Import & restore a configuration backup (Replace semantics) — super_admin only
      security:
        - cookieAuth: []
      description: |
        Validates, snapshots, restores (in a single transaction), and re-applies a
        backup produced by the export endpoint. Accepts both schema v2 and legacy
        v1 files (v1 is mapped into v2 automatically).

        **Replace semantics:** all user-editable configuration is wiped and
        restored from the file. System-seeded rows (system address/service
        objects, `system`/`defaultgateway` routes) are preserved. On any error the
        transaction rolls back and the original DB is left untouched — a pre-import
        DB snapshot is also written next to the DB file.

        Interfaces are matched by name to the live device; interfaces in the file
        that don't exist here are skipped (reported in `warnings`). After the DB
        restore the config is re-applied to the kernel in startup order; individual
        apply failures are non-fatal and returned as `warnings`.

        Users are only restored when `includeUsers=1` and the file contains a
        `users` section; the importing account is always kept as an active
        super_admin to prevent lock-out. **super_admin only**; blocked in
        `-disable-edit` mode.
      parameters:
        - name: includeUsers
          in: query
          required: false
          schema:
            type: string
            enum: ["1", "true"]
          description: When set (and the file has a users section), restores user accounts.
        - name: X-Backup-Passphrase
          in: header
          required: false
          schema:
            type: string
          description: Required to decrypt an encrypted backup (`meta.encrypted=true`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BackupFile'
      responses:
        '200':
          description: Import completed (see counts + non-fatal warnings)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportResult'
        '400':
          description: |
            Invalid/corrupt file, checksum mismatch, unsupported schema version,
            wrong passphrase, failed validation, or a restore error (no changes applied).
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Forbidden — requires super_admin
        '422':
          description: Encrypted backup imported without a passphrase
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  needPassphrase:
                    type: boolean
                    example: true

  # =========================================================================
  # QoS BANDWIDTH CONTROL
  # =========================================================================
  /qos/rules:
