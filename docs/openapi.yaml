            schema:
              $ref: '#/components/schemas/DhcpConfig'
      responses:
        '200':
          description: Configuration updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DhcpConfig'

  /dhcp/configs:
    get:
      tags:
        - DHCP Server
      summary: Get all per-interface DHCP server configurations (multi-scope)
      responses:
        '200':
          description: List of DHCP configurations (one per LAN interface)
          content:
            application/json:
              schema:
                type: array
                items:
