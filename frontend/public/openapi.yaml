# =========================================================================
# COMPONENTS & SCHEMAS
# =========================================================================
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Enter the Bearer session token generated during login.

  responses:
    Unauthorized:
      description: Authentication required or token is invalid/expired
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Unauthorized

    BadRequest:
      description: Invalid request body or parameters
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Bad Request

    NotFound:
      description: The requested resource was not found
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Not Found

  schemas:
    # --- Dashboard Schemas ---
    DashboardStats:
      type: object
      required:
        - firewallStatus
        - totalTrafficIn
        - totalTrafficOut
        - dhcpLeasesCount
        - wifiStatus
        - wifiSSID
      properties:
        firewallStatus:
          type: string
          example: Active
        totalTrafficIn:
          type: string
          example: 8.7 GB
        totalTrafficOut:
          type: string
          example: 3.7 GB
        dhcpLeasesCount:
          type: integer
          example: 18
        wifiStatus:
          type: string
          example: wlan0 Master
        wifiSSID:
          type: string
          example: PiGate-Secure

    PerformanceMetrics:
      type: object
      required:
        - cpu
        - memory
        - temp
      properties:
        cpu:
          type: number
          format: float
          example: 14.2
        memory:
          type: number
          format: float
          example: 15.5
        temp:
          type: number
          format: float
          example: 48.5

    FirewallLog:
      type: object
      required:
        - id
        - time
        - action
        - src
        - dest
        - port
        - proto
        - reason
      properties:
        id:
          type: string
          example: log-1
        time:
          type: string
          example: "14:31:02"
        action:
          type: string
          enum: [PASS, DROP]
          example: DROP
        src:
          type: string
          example: 185.220.101.4
        dest:
          type: string
          example: 10.0.0.45
        port:
          type: string
          example: "445"
        proto:
          type: string
          example: TCP
        reason:
          type: string
          example: Blocked Port (SMB)

    # --- Network Interface Schemas ---
    NetworkInterface:
      type: object
      required:
        - id
        - name
        - alias
        - role
        - type
        - subtype
        - addressingMode
        - ip
        - netmask
        - gateway
        - macAddress
        - adminAccess
        - status
        - speed
      properties:
        id:
          type: string
          example: iface-1
        name:
          type: string
          description: OS-level interface name (e.g. eth0, wlan0)
          example: eth0
        alias:
          type: string
          description: Human-readable label for the interface
          example: LAN_Internal
        role:
          type: string
          enum: [LAN, WAN]
          example: LAN
        type:
          type: string
          enum: [ethernet, wireless]
          example: ethernet
        subtype:
          type: string
          description: |
            More specific interface subtype. Examples: 'device' (physical NIC), 'veth' (virtual ethernet),
            'bridge' (software bridge), 'vlan' (VLAN sub-interface).
          example: device
        addressingMode:
          type: string
          enum: [dhcp, static]
          example: static
        ip:
          type: string
          example: 192.168.1.1
        netmask:
          type: string
          description: CIDR prefix length as string (e.g. "24")
          example: "24"
        gateway:
          type: string
          example: ""
        macAddress:
          type: string
          example: "DC:A6:32:AA:BB:C1"
        adminAccess:
          type: array
          description: List of management protocols allowed on this interface
          items:
            type: string
            enum: [HTTPS, HTTP, PING, SSH]
          example: [PING, HTTP, SSH]
        status:
          type: string
          enum: [up, down]
          example: up
        speed:
          type: string
          description: Link speed string from kernel (e.g. "1000 Mbps")
          example: "1000 Mbps"
        # Optional Wireless-only Fields (present when type=wireless)
        wifiSSID:
          type: string
          example: MyHome_5G
        wifiPassword:
          type: string
          description: Masked as "••••••••" in API responses for security. Send masked value to preserve existing password.
          example: "••••••••"
        wifiSecurity:
          type: string
          description: Wi-Fi security protocol (Open, WPA2-PSK, WPA3-SAE, etc.)
          example: WPA2-PSK
        macMode:
          type: string
          enum: [hardware, randomized, laa]
          description: |
            MAC address mode for the wireless interface.
            - hardware: use the real burned-in MAC address
            - randomized: let wpa_supplicant randomize MAC per-connection (preassoc_mac_addr=1, mac_addr=1)
            - laa: use a locally administered address (LAA) specified in laaMacAddress
          example: hardware
        realMacAddress:
          type: string
          description: The actual hardware MAC burned into the NIC
          example: "DC:A6:32:AA:BB:C1"
        randomizedMac:
          type: string
          description: Last randomized MAC address used by wpa_supplicant
          example: "4E:88:2F:BC:A1:90"
        laaMacAddress:
          type: string
          description: Custom locally administered MAC address when macMode=laa
          example: "9A:11:22:33:44:55"
        randomizeOnReconnect:
          type: boolean
          description: If true, wpa_supplicant generates a new random MAC on each reconnect
          example: true
        failoverEnabled:
          type: boolean
          description: If true, automatic failover to backupSsid is enabled when primary SSID is unreachable
          example: false
        backupSsid:
          type: string
          example: MyHome_2G
        backupWifiPassword:
          type: string
          description: Backup SSID password (masked as "••••••••" in responses)
          example: "••••••••"
        backupWifiSecurity:
          type: string
          example: WPA2-PSK
        ipCheckTimeout:
          type: integer
          description: Seconds to wait before declaring primary connection failed (failover check)
          example: 15
        primaryMaxRetries:
          type: integer
          description: Number of retries before switching to backup SSID
          example: 3
        failoverCooldown:
          type: integer
          description: Seconds to wait before attempting to reconnect to primary SSID after failover
          example: 60

    WifiScanResult:
      type: object
      required:
        - ssid
        - signal
        - security
        - channel
        - frequency
      properties:
        ssid:
          type: string
          example: MyHome_5G
        signal:
          type: integer
          minimum: 0
          maximum: 100
          example: 85
        security:
          type: string
          example: WPA2-PSK
        channel:
          type: integer
          example: 36
        frequency:
          type: string
          example: "5 GHz"

    WifiConnectionStatus:
      type: object
      required:
        - state
        - ssid
        - bssid
        - activeMac
      properties:
        state:
          type: string
          description: |
            wpa_supplicant connection state string. Common values:
            COMPLETED (connected), DISCONNECTED, SCANNING, ASSOCIATING, AUTHENTICATING,
            ASSOCIATED, 4WAY_HANDSHAKE, GROUP_HANDSHAKE, INACTIVE, INTERFACE_DISABLED.
            Mapped to user-friendly strings by the backend (e.g. COMPLETED → "Connected").
          example: COMPLETED
        ssid:
          type: string
          description: Name of the currently connected Wi-Fi network
          example: MyHome_5G
        bssid:
          type: string
          description: MAC address of the connected Access Point
          example: "00:11:22:33:44:55"
        activeMac:
          type: string
          description: The currently effective MAC address of the interface (may differ from hardware MAC if randomization is active)
          example: "4E:88:2F:BC:A1:90"
        freq:
          type: integer
          description: Connection frequency in MHz (e.g. 5180, 2412)
          example: 5745
        keyMgmt:
          type: string
          description: Security protocol in use (e.g. WPA3, WPA2, Open)
          example: WPA3
        wifiGen:
          type: string
          description: Wi-Fi generation string (e.g. WiFi 6, WiFi 5, WiFi 4)
          example: WiFi 6

    # --- Firewall Policy Schemas ---
    PolicyRule:
      type: object
      required:
        - id
        - name
        - inInterface
        - outInterface
        - source
        - destination
        - service
        - action
        - log
        - status
      properties:
        id:
          type: string
          example: rule-a1b2
        name:
          type: string
          example: Block_Malicious
        inInterface:
          type: string
          example: eth0
        outInterface:
          type: string
          example: wlan0
        source:
          type: array
          items:
            type: string
          example: [LAN_Network]
        destination:
          type: array
          items:
            type: string
          example: [Malicious_IP_List]
        service:
          type: array
          items:
            type: string
          example: [ALL]
        action:
          type: string
          enum: [ACCEPT, DROP]
          example: DROP
        log:
          type: boolean
          example: true
        status:
          type: boolean
          example: true

    PolicyRuleInput:
      type: object
      required:
        - name
        - inInterface
        - outInterface
        - source
        - destination
        - service
        - action
        - log
        - status
      properties:
        name:
          type: string
          example: Block_Malicious
        inInterface:
          type: string
          example: eth0
        outInterface:
          type: string
          example: wlan0
        source:
          type: array
          items:
            type: string
          example: [LAN_Network]
        destination:
          type: array
          items:
            type: string
          example: [Malicious_IP_List]
        service:
          type: array
          items:
            type: string
          example: [ALL]
        action:
          type: string
          enum: [ACCEPT, DROP]
          example: DROP
        log:
          type: boolean
          example: true
        status:
          type: boolean
          example: true

    # --- Address Object Schemas ---
    AddressObject:
      type: object
      required:
        - id
        - name
        - type
        - value
        - system
        - refPolicies
      properties:
        id:
          type: string
          example: addr-2
        name:
          type: string
          example: LAN_Network
        type:
          type: string
          enum: [subnet, range, fqdn]
          example: subnet
        value:
          type: string
          example: 192.168.1.0/24
        system:
          type: boolean
          example: false
        refPolicies:
          type: array
          items:
            type: string
          example: [rule-a1b2]

    AddressObjectInput:
      type: object
      required:
        - name
        - type
        - value
      properties:
        name:
          type: string
          example: LAN_Network
        type:
          type: string
          enum: [subnet, range, fqdn]
          example: subnet
        value:
          type: string
          example: 192.168.1.0/24
        comment:
          type: string
          example: Local LAN network subnet card

    # --- Service Object Schemas ---
    ServiceObject:
      type: object
      required:
        - id
        - name
        - protocol
        - port
        - type
        - refPolicies
      properties:
        id:
          type: string
          example: svc-2
        name:
          type: string
          example: HTTP
        protocol:
          type: string
          enum: [TCP, UDP, TCP/UDP, ICMP]
          example: TCP
        port:
          type: string
          example: "80"
        type:
          type: string
          enum: [system, custom]
          example: system
        refPolicies:
          type: array
          items:
            type: string
          example: []

    ServiceObjectInput:
      type: object
      required:
        - name
        - protocol
        - port
      properties:
        name:
          type: string
          example: Custom_Web_Port
        protocol:
          type: string
          enum: [TCP, UDP, TCP/UDP, ICMP]
          example: TCP
        port:
          type: string
          example: "8080"
        comment:
          type: string
          example: Alternative HTTP web port

    # --- Static Route Schemas ---
    RoutesConfig:
      type: object
      description: Backend runtime flags controlling routing behavior
      required:
        - allowEditSystemRoutes
        - prioritizeKernelRoutes
        - enableEditSystemRoute
      properties:
        allowEditSystemRoutes:
          type: boolean
          description: |
            When true, routes of type 'system' (directly connected kernel routes) can be
            edited, deleted, or toggled. Controlled by the `-allow-edit-system-routes` CLI flag.
          example: false
        prioritizeKernelRoutes:
          type: boolean
          description: |
            [Experimental] When true, the kernel routing table (/proc/net/route) is the source of truth.
            Routes found in kernel have their metric and type updated from kernel data.
            Routes NOT in kernel (system/defaultgateway types) are automatically marked inactive.
            User-toggled status in DB is preserved and not overridden by kernel state.
            Controlled by the `-prioritize-kernel-routes` CLI flag. (Default: false)
          example: false
        enableEditSystemRoute:
          type: boolean
          description: |
            Runtime active state of system route editing. Reflects whether the user has currently
            toggled the system route edit mode on. This is the live state used by the RoutingService,
            and may be false even when allowEditSystemRoutes is true.
          example: false

    StaticRoute:
      type: object
      required:
        - id
        - destination
        - gateway
        - interface
        - metric
        - description
        - status
        - type
        - scope
        - src
        - proto
      properties:
        id:
          type: string
          description: |
            For user-created routes: UUID (e.g. `route-1`).
            For kernel-only routes not yet in DB: canonical ID `route-sys-[dest]-[gw]-[iface]`.
          example: route-1
        destination:
          type: string
          example: 0.0.0.0/0
        gateway:
          type: string
          description: Next-hop gateway IP. Empty string for directly connected (system) routes.
          example: 10.0.0.1
        interface:
          type: string
          example: wlan0
        metric:
          type: integer
          description: Route priority. Lower value = higher priority. Synced from kernel when prioritizeKernelRoutes is true.
          example: 100
        description:
          type: string
          example: Default gateway route (WAN)
        status:
          type: boolean
          description: |
            Whether the route is enabled. Stored in DB and preserved across GetRoutes calls.
            For system/defaultgateway types: auto-set to false if route not found in kernel.
          example: true
        type:
          type: string
          enum: [system, custom, defaultgateway, customgateway]
          description: |
            - `system`: directly connected route (no gateway), read-only unless -allow-edit-system-routes is set
            - `defaultgateway`: route to 0.0.0.0/0, always editable and toggleable
            - `custom`: user-defined route, always editable and toggleable
            - `customgateway`: user-defined route with gateway, always editable and toggleable
          example: defaultgateway
        scope:
          type: string
          description: Route scope (e.g. 'global', 'link', 'host').
          example: global
        src:
          type: string
          description: Preferred source IP address.
          example: 192.168.1.2
        proto:
          type: string
          description: Route protocol (e.g. 'kernel', 'boot', 'static', '120').
          example: static

    StaticRouteInput:
      type: object
      required:
        - destination
        - gateway
        - interface
        - metric
        - description
        - status
        - scope
        - src
        - proto
      properties:
        destination:
          type: string
          example: 192.168.10.0/24
        gateway:
          type: string
          example: 192.168.1.250
        interface:
          type: string
          example: eth0
        metric:
          type: integer
          example: 10
        description:
          type: string
          example: Connection route to branch office
        status:
          type: boolean
          example: true
        scope:
          type: string
          description: Route scope (e.g. 'global', 'link', 'host').
          example: global
        src:
          type: string
          description: Preferred source IP address.
          example: 192.168.1.2
        proto:
          type: string
          description: Route protocol (e.g. 'kernel', 'boot', 'static', '120').
          example: static

