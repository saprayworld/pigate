openapi: 3.0.0
info:
  title: PiGate API Specification
  description: API endpoints for PiGate - Raspberry Pi 5 Firewall & Gateway Controller. This spec is synchronized with the React frontend service layer.
  version: 1.0.0
servers:
  - url: http://localhost:2479/api
    description: Development server (default port)
  - url: /api
    description: Production (same-origin)

security:
  - BearerAuth: []

paths:
  # =========================================================================
  # AUTHENTICATION
  # =========================================================================
  /auth/login:
    post:
      tags:
        - Authentication
      summary: Administrator login
      security: [] # No auth required
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  example: admin
                password:
                  type: string
                  format: password
                  example: admin
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    example: session_id_abc123xyz
                  mustChangePassword:
                    type: boolean
                    description: If true, user must change password before using other API endpoints
                    example: false
        '401':
          description: Invalid username or password
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Invalid username or password

  /auth/session:
    get:
      tags:
        - Authentication
      summary: Check current session validity and user context
      description: |
        Verifies that the current bearer token/session cookie is still valid on the backend.
        Also returns whether the user must change their password (IsInitial check).
        If mustChangePassword is true, all other API endpoints (except /system/password) will return 403 Forbidden.
      responses:
        '200':
          description: Session is valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                    example: true
                  username:
                    type: string
                    example: pigate
                  mustChangePassword:
                    type: boolean
                    example: false
        '401':
          description: Session invalid or expired

  /auth/logout:
    post:
      tags:
        - Authentication
      summary: Log out from the system
      description: Invalidates the current session token and clears the session cookie.
      responses:
        '200':
          description: Logout successful

  # =========================================================================
  # DASHBOARD
  # =========================================================================
  /dashboard/stats:
    get:
      tags:
        - Dashboard
      summary: Get general dashboard metrics and summary status
      responses:
        '200':
          description: General stats retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardStats'

  /dashboard/performance:
    get:
      tags:
        - Dashboard
      summary: Get live hardware performance metrics (CPU, RAM, Temp)
      responses:
        '200':
          description: Performance metrics retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PerformanceMetrics'

  /dashboard/logs:
    get:
      tags:
        - Dashboard
      summary: Get recent firewall filter packet logs (nftables block logs)
      responses:
        '200':
          description: List of firewall logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FirewallLog'

  /dashboard/logs/clear:
    post:
      tags:
        - Dashboard
      summary: Clear all firewall packet filter logs
      responses:
        '200':
          description: Logs cleared successfully

  /dashboard/logs/stream:
    get:
      tags:
        - Dashboard
      summary: Server-Sent Events (SSE) stream for live firewall block logs
      description: Establishes a text/event-stream connection to push live firewall logs.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: SSE stream initiated
          headers:
            Content-Type:
              schema:
                type: string
                example: text/event-stream
            Cache-Control:
              schema:
                type: string
                example: no-cache
            Connection:
              schema:
                type: string
                example: keep-alive

  # =========================================================================
  # NETWORK INTERFACES
  # =========================================================================
  /interfaces:
    get:
      tags:
        - Network Interfaces
      summary: Get all network interfaces (Ethernet & Wireless)
      responses:
        '200':
          description: List of interfaces
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NetworkInterface'

  /interfaces/{id}:
    put:
      tags:
        - Network Interfaces
      summary: Full update of a network interface configuration
      description: |
        Replaces the full configuration of an interface. For password fields (wifiPassword, backupWifiPassword),
        if the masked placeholder "••••••••" is sent, the existing stored password is preserved.
        Wi-Fi passwords are only updated if non-empty and not masked, or if security is explicitly "Open".
        If adminAccess changes, firewall rules are automatically re-synced.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NetworkInterface'
      responses:
        '200':
          description: Interface updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworkInterface'
        '404':
          description: Interface not found
        '500':
          description: Internal server error or OS firewall sync failed
    patch:
      tags:
        - Network Interfaces
      summary: Partial update of a network interface configuration
      description: |
        Applies partial (PATCH) updates to an interface. Only fields explicitly present in the request body
        are updated; omitted fields are left unchanged. Useful for changing a single property without
        sending the full interface payload.
        Password masking rules are identical to PUT.
        If adminAccess changes, firewall rules are automatically re-synced.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                alias:
                  type: string
                role:
                  type: string
                  enum: [LAN, WAN]
                addressingMode:
                  type: string
                  enum: [dhcp, static]
                ip:
                  type: string
                netmask:
                  type: string
                gateway:
                  type: string
                macAddress:
                  type: string
                status:
                  type: string
                  enum: [up, down]
                adminAccess:
                  type: array
                  items:
                    type: string
                    enum: [HTTPS, HTTP, PING, SSH]
                wifiSSID:
                  type: string
                wifiPassword:
                  type: string
                wifiSecurity:
                  type: string
                macMode:
                  type: string
                  enum: [hardware, randomized, laa]
                laaMacAddress:
                  type: string
                randomizeOnReconnect:
                  type: boolean
                failoverEnabled:
                  type: boolean
                backupSsid:
                  type: string
                backupWifiPassword:
                  type: string
                backupWifiSecurity:
                  type: string
                ipCheckTimeout:
                  type: integer
                primaryMaxRetries:
                  type: integer
                failoverCooldown:
                  type: integer
      responses:
        '200':
          description: Interface partially updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworkInterface'
        '404':
          description: Interface not found
        '500':
          description: Internal server error or OS firewall sync failed
    delete:
      tags:
        - Network Interfaces
      summary: Delete an interface
      description: Deletes an interface. Only offline interfaces can be deleted. Active interfaces will return a 400 Bad Request error.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Interface deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        '400':
          description: Cannot delete active interfaces
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Cannot delete active interfaces. Only offline interfaces can be deleted.
        '404':
          description: Interface not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Interface not found
        '500':
          description: Internal server error

  /interfaces/{id}/toggle:
    post:
      tags:
        - Network Interfaces
      summary: Toggle interface status UP or DOWN (ifconfig up/down)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Toggle state changed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworkInterface'
  /interfaces/{id}/reset:
    post:
      tags:
        - Network Interfaces
      summary: Reset interface configuration to default values
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Interface reset successful, returns default configurations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworkInterface'
        '404':
          description: Interface not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Interface not found
        '500':
          description: Internal server error

  /interfaces/{id}/scan:
    get:
      tags:
        - Network Interfaces
      summary: Scan for available Wi-Fi access points (Wireless interfaces only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Wi-Fi scan results retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WifiScanResult'

  /interfaces/{id}/wifi-status:
    get:
      tags:
        - Network Interfaces
      summary: Retrieve the live real-time Wi-Fi connection status (Wireless interfaces only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Wi-Fi connection status retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WifiConnectionStatus'
        '400':
          description: Interface is not wireless
        '404':
          description: Interface not found

  # =========================================================================
  # FIREWALL POLICIES
  # =========================================================================
  /policies:
    get:
      tags:
        - Firewall Policies
      summary: Retrieve all firewall policy rules ordered by precedence
      responses:
        '200':
          description: List of policy rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PolicyRule'
    post:
      tags:
        - Firewall Policies
      summary: Create a new firewall policy rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyRuleInput'
      responses:
        '200':
          description: Policy created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyRule'

  /policies/{id}:
    put:
      tags:
        - Firewall Policies
      summary: Update an existing firewall policy rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyRuleInput'
      responses:
        '200':
          description: Policy updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyRule'
    delete:
      tags:
        - Firewall Policies
      summary: Delete a firewall policy rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Policy deleted successfully
          content:
            application/json:
              schema:
                type: boolean
                example: true

  /policies/reorder:
    put:
      tags:
        - Firewall Policies
      summary: Save the full rules list in the new order (Drag and Drop sequence)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - policies
              properties:
                policies:
                  type: array
                  items:
                    $ref: '#/components/schemas/PolicyRule'
      responses:
        '200':
          description: Reordered list saved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PolicyRule'

  /policies/{id}/toggle-log:
    post:
      tags:
        - Firewall Policies
      summary: Toggle logging state for a specific rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Logging status toggled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyRule'

  /policies/{id}/toggle-status:
    post:
      tags:
        - Firewall Policies
      summary: Enable or disable a specific firewall rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Rule active status toggled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyRule'

  /policies/apply:
    post:
      tags:
        - Firewall Policies
      summary: Apply current firewall rules to Kernel space (loads configuration to nftables)
      responses:
        '200':
          description: Policies successfully loaded into nftables kernel engine
          content:
            application/json:
              schema:
                type: boolean
                example: true

  # =========================================================================
  # ADDRESS OBJECTS
  # =========================================================================
  /addresses:
    get:
      tags:
        - Address Objects
      summary: Get all address objects (IP/Subnets, Ranges, FQDNs)
      responses:
        '200':
          description: List of address objects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AddressObject'
    post:
      tags:
        - Address Objects
      summary: Create a new address object
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddressObjectInput'
      responses:
        '200':
          description: Address object created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressObject'

  /addresses/{id}:
    put:
      tags:
        - Address Objects
      summary: Update an existing custom address object (System-predefined objects are protected)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddressObjectInput'
      responses:
        '200':
          description: Address object updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressObject'
    delete:
      tags:
        - Address Objects
      summary: Delete an address object (Fails if object is predefined or referenced by policies)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Address object deleted
          content:
            application/json:
              schema:
                type: boolean
                example: true

  /addresses/bulk-delete:
    post:
      tags:
        - Address Objects
      summary: Bulk delete multiple custom address objects
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ids
              properties:
                ids:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Selected addresses deleted
          content:
            application/json:
              schema:
                type: boolean
                example: true

  # =========================================================================
  # SERVICE OBJECTS
  # =========================================================================
  /services:
    get:
      tags:
        - Service Objects
      summary: Get all service objects (protocols and port definitions)
      responses:
        '200':
          description: List of service objects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ServiceObject'
    post:
      tags:
        - Service Objects
      summary: Create a new custom service object
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceObjectInput'
      responses:
        '200':
          description: Service object created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceObject'

  /services/{id}:
    put:
      tags:
        - Service Objects
      summary: Update a custom service object (Predefined objects are protected)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceObjectInput'
      responses:
        '200':
          description: Service object updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceObject'
    delete:
      tags:
        - Service Objects
      summary: Delete a custom service object (Fails if predefined or referenced by policies)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Service object deleted
          content:
            application/json:
              schema:
                type: boolean
                example: true

  # =========================================================================
  # STATIC ROUTES
  # =========================================================================
  /routes:
    get:
      tags:
        - Static Routes
      summary: Get all static routing table rows
      responses:
        '200':
          description: List of static routes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StaticRoute'
    post:
      tags:
        - Static Routes
      summary: Create a new custom static route
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StaticRouteInput'
      responses:
        '200':
          description: Static route created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaticRoute'

  /routes/{id}:
    put:
      tags:
        - Static Routes
      summary: Update an existing custom static route (System-defined routes are protected)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StaticRouteInput'
      responses:
        '200':
          description: Static route updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaticRoute'
    delete:
      tags:
        - Static Routes
      summary: Delete a custom static route
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Static route deleted
          content:
            application/json:
              schema:
                type: boolean
                example: true

  /routes/bulk-delete:
    post:
      tags:
        - Static Routes
      summary: Delete multiple custom static routes in bulk
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ids
              properties:
                ids:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Custom routes deleted
          content:
            application/json:
              schema:
                type: boolean
                example: true

  /routes/config:
    get:
      tags:
        - Static Routes
      summary: Get routing configuration flags
      description: |
        Returns the current backend configuration flags that control routing behavior:
        - `allowEditSystemRoutes`: whether system/kernel-detected routes can be edited or deleted
        - `prioritizeKernelRoutes`: whether kernel routing table is used as source of truth for route status
      responses:
        '200':
          description: Routing configuration flags
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoutesConfig'

  /routes/{id}/toggle:
    post:
      tags:
        - Static Routes
      summary: Toggle active status (enable/disable) of a route
      description: |
        Toggles the `status` field of the route in the database.
        - `custom` and `defaultgateway` routes: always toggleable.
        - `system` routes: blocked unless `-allow-edit-system-routes` flag is set on the backend.
        After toggle, the new route status is applied to the kernel via netlink.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Route status toggled, returns updated route
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaticRoute'
        '500':
          description: Toggle blocked (system route) or kernel apply failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: cannot toggle status of system predefined static routes

  /routes/apply:
    post:
      tags:
        - Static Routes
      summary: Apply routing table changes to Kernel (netlink socket update)
      responses:
        '200':
          description: Routes loaded successfully into Kernel routing tables
          content:
            application/json:
              schema:
                type: boolean
                example: true

  # =========================================================================
  # DHCP SERVER
  # =========================================================================
  /dhcp/config:
    get:
      tags:
        - DHCP Server
      summary: Get DHCP Server main configuration parameters
      responses:
        '200':
          description: DHCP configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DhcpConfig'
    put:
      tags:
        - DHCP Server
      summary: Update DHCP Server configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DhcpConfig'
      responses:
        '200':
          description: Configuration updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DhcpConfig'

  /dhcp/reservations:
    get:
      tags:
        - DHCP Server
      summary: Get all static IP reservations
      responses:
        '200':
          description: List of reservations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DhcpReservation'
    post:
      tags:
        - DHCP Server
      summary: Add a static IP reservation mapping device MAC to a reserved IP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DhcpReservationInput'
      responses:
        '200':
          description: Reservation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DhcpReservation'

  /dhcp/reservations/{id}:
    put:
      tags:
        - DHCP Server
      summary: Update an IP reservation mapping
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DhcpReservationInput'
      responses:
        '200':
          description: Reservation updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DhcpReservation'
    delete:
      tags:
        - DHCP Server
      summary: Delete an IP reservation mapping
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Reservation deleted
          content:
            application/json:
              schema:
                type: boolean
                example: true

  /dhcp/leases:
    get:
      tags:
        - DHCP Server
      summary: Get active IP leases from DHCP lease log database
      parameters:
        - name: refresh
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: Force reading and updating leases from system logs
      responses:
        '200':
          description: List of active leases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ActiveDhcpLease'

  /dhcp/apply:
    post:
      tags:
        - DHCP Server
      summary: Restart daemon with new configuration changes (apply parameters)
      responses:
        '200':
          description: Config applied successfully
          content:
            application/json:
              schema:
                type: boolean
                example: true

  # =========================================================================
  # SYSTEM & MAINTENANCE
  # =========================================================================
  /system/time:
    get:
      tags:
        - System & Maintenance
      summary: Get timezone and NTP network time synchronization configuration
      responses:
        '200':
          description: System time settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemTimeSettings'
    put:
      tags:
        - System & Maintenance
      summary: Save timezone and NTP server configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystemTimeSettings'
      responses:
        '200':
          description: Time settings updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemTimeSettings'

  /system/dns:
    get:
      tags:
        - System & Maintenance
      summary: Get system-wide DNS configuration
      responses:
        '200':
          description: System DNS settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DNSConfig'
    put:
      tags:
        - System & Maintenance
      summary: Update system-wide DNS configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DNSConfigInput'
      responses:
        '200':
          description: DNS configuration updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DNSConfigInput'

  /system/password:
    put:
      tags:
        - System & Maintenance
      summary: Change administrator dashboard login password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
              properties:
                currentPassword:
                  type: string
                  format: password
                newPassword:
                  type: string
                  format: password
      responses:
        '200':
          description: Password updated successfully
        '400':
          description: Current password incorrect or validation failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: รหัสผ่านปัจจุบันไม่ถูกต้อง

  /system/services:
    get:
      tags:
        - System & Maintenance
      summary: Get statuses of critical network service daemons (nftables, isc-dhcp-server, NetworkManager)
      responses:
        '200':
          description: Services status list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NetworkServiceStatus'

  /system/services/{id}/restart:
    post:
      tags:
        - System & Maintenance
      summary: Restart a system service daemon by service ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Service restart command executed

  /system/reboot:
    post:
      tags:
        - System & Maintenance
      summary: Reboot the Raspberry Pi 5 board host
      responses:
        '200':
          description: Reboot command received, board restarting

  /system/shutdown:
    post:
      tags:
        - System & Maintenance
      summary: Shutdown/halt the Raspberry Pi 5 board host
      responses:
        '200':
          description: Shutdown command received, board halting

  /system/config/export:
    get:
      tags:
        - System & Maintenance
      summary: Export full configuration JSON payload (all settings & object databases backup)
      description: |
        Returns a complete JSON backup of all system configuration including interfaces,
        static routes, firewall policies, address objects, service objects, DHCP config,
        DHCP reservations, and system time settings.
      responses:
        '200':
          description: Settings backup export payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  device:
                    type: string
                    example: PiGate Firewall Gateway
                  version:
                    type: string
                    example: v1.0.0-Release
                  exportedAt:
                    type: string
                    format: date-time
                    example: "2025-01-01T00:00:00Z"
                  systemSettings:
                    $ref: '#/components/schemas/SystemTimeSettings'
                  config:
                    type: object
                    properties:
                      addresses:
                        type: array
                        items:
                          $ref: '#/components/schemas/AddressObject'
                      serviceObjects:
                        type: array
                        items:
                          $ref: '#/components/schemas/ServiceObject'
                      policies:
                        type: array
                        items:
                          $ref: '#/components/schemas/PolicyRule'
                      routes:
                        type: array
                        items:
                          $ref: '#/components/schemas/StaticRoute'
                      interfaces:
                        type: array
                        items:
                          $ref: '#/components/schemas/NetworkInterface'
                      dhcp:
                        type: object
                        properties:
                          config:
                            $ref: '#/components/schemas/DhcpConfig'
                          reservations:
                            type: array
                            items:
                              $ref: '#/components/schemas/DhcpReservation'

  /system/config/import:
    post:
      tags:
        - System & Maintenance
      summary: Import configuration JSON payload (overwrites current tables and restores configs)
      description: |
        Restores a configuration from a previously exported backup JSON.
        System-predefined objects (system addresses, service objects, system routes, defaultgateway routes)
        are skipped to prevent duplication.
        All other records (custom routes, policies, custom addresses, custom services, DHCP config/reservations,
        interfaces, and system time settings) are restored.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Same structure as the export payload
      responses:
        '200':
          description: Import completed successfully and configs restored
        '400':
          description: Invalid JSON structure in import payload

  # =========================================================================
